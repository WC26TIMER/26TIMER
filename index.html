
<!DOCTYPE html> 
<html lang="es">
<head> 
  <link rel="manifest" href="/26TIMER/manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026™ Timer</title>
  <link rel="icon" type="image/png" href="logo.png">
<style>
@font-face{
  font-family:'FWC2026';
  src:url('./FWC26.ttf') format('truetype'); 
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'FWC2026',sans-serif}
body{background:#000;color:#fff;overflow:hidden} 
#startScreen,#intro,#main,#matchView{position:absolute;inset:0} 
#startScreen{display:flex;flex-direction:column;justify-content:center;align-items:center;background:#000;z-index:5}
#enterBtn{padding:18px 50px;border:none;border-radius:15px;font-size:2rem;cursor:pointer;color:#000;background:linear-gradient(135deg,#ffffff,#9b9b9b)}
#intro{display:none;background:#000;z-index:4}
#intro video{width:100%;height:100%;object-fit:cover}
#main,
#matchView,
#worldCupView,
#winnerVideoView{
    display:none;
    background:url('fondo.png') center/cover no-repeat
}
.overlay{min-height:100vh;background:rgba(0,0,0,.45);display:flex;flex-direction:column;justify-content:center;align-items:center}
#worldCupBtn{

  position:absolute;

  top:25px;
  right:25px;

  padding:10px 18px;

  border:1px solid rgba(255,255,255,.4);

  border-radius:30px;

  background:rgba(255,255,255,.08);

  backdrop-filter:blur(10px);

  color:white;

  cursor:pointer;

  font-size:14px;

  transition:.3s;

}

#worldCupBtn:hover{

  background:rgba(255,255,255,.15);

  transform:scale(1.05);

}
.logo{width:220px;margin-bottom:20px}
#selecciones{padding:16px;width:420px;max-width:90%}
#matchView .overlay{justify-content:flex-start;padding-top:30px}
#backBtn{align-self:flex-start;margin-left:20px;padding:12px 24px;border:none;border-radius:12px;background:linear-gradient(135deg,#ffffff,#9b9b9b);color:#000;cursor:pointer}
#skipBtn{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 24px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#ffffff,#9b9b9b);
  color:#000;
  cursor:pointer;
  display:none;
  z-index:99999;
}
#updateBtn{

position:fixed;

top:20px;
right:20px;

padding:12px 24px;

border:none;
border-radius:12px;

background:#ffcc00;

color:#000;

cursor:pointer;

display:none;

z-index:999999999;

}
#reportBtn{

  position:fixed;

  right:20px;
  bottom:20px;

  min-width:220px;
  min-height:50px;

  padding:12px 24px;

  border:none;
  border-radius:12px;

  background:linear-gradient(
    135deg,
    #ffffff,
    #9b9b9b
  );

  color:#000;

  cursor:pointer;

  z-index:99999999;

  display:none;

}
#reportModal{

  position:fixed;
  inset:0;

  background:rgba(0,0,0,.7);

  display:none;

  justify-content:center;
  align-items:center;

  z-index:999999;

}

.reportBox{

  width:500px;
  max-width:90%;

  background:#111;

  border-radius:20px;

  padding:25px;

}

.reportBox h2{

  text-align:center;
  margin-bottom:20px;

}

#bugText{

  width:100%;
  height:180px;

  resize:none;

  border:none;
  border-radius:12px;

  padding:15px;

  font-size:16px;

  color:#000;

}

.reportButtons{

  margin-top:20px;

  display:flex;
  justify-content:center;
  gap:15px;

}

.reportButtons button{

  padding:12px 24px;

  border:none;
  border-radius:12px;

  background:linear-gradient(
    135deg,
    #ffffff,
    #9b9b9b
  );

  color:#000;

  cursor:pointer;

}
.teams{display:flex;align-items:center;gap:40px;margin-top:40px}
.team{text-align:center}
.crest{width:140px;height:140px;object-fit:contain}
.vs{font-size:3rem}
.timer{display:flex;gap:40px;margin-top:10px;}
.timebox{text-align:center}
.num{font-size:6rem}
.label{
font-size:1rem
}
#worldLogo{

width:120px;

margin-top:20px;

margin-bottom:20px;

}

/* PEGAR AQUÍ */

#worldCupView{
display:none;
background:black;
}

#winnerVideoView{
display:none;
background:black;
}

#winnerVideo{
width:100%;
height:100vh;
object-fit:cover;
}

#worldBackBtn{

margin-top:40px;

padding:10px 18px;

border:1px solid rgba(255,255,255,.4);

border-radius:30px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(10px);

color:white;

cursor:pointer;

font-size:14px;

transition:.3s;

}

#worldBackBtn:hover{

background:rgba(255,255,255,.15);

transform:scale(1.05);

}

#wcTitle{

font-size:4rem;

margin-top:10px;

margin-bottom:20px;

}

#winnerSection{

display:none;

flex-direction:column;

align-items:center;

gap:15px;

margin-top:50px;

}

#winnerName{

font-size:3rem;

}

#winnerText{

font-size:1.2rem;

}

#playWinnerVideo{

padding:14px 24px;

border:none;

border-radius:12px;

background:linear-gradient(
135deg,
#ffffff,
#9b9b9b
);

color:#000;

cursor:pointer;

}
/* ========================================================
   AJUSTES RESPONSIVOS PARA CELULARES (MODO VERTICAL)
   ======================================================== */
@media (max-width: 500px) {
  /* Bloquear completamente el scroll y el gesto de arrastrar para actualizar */
  html, body {
    overflow: hidden !important;
    overscroll-behavior-y: none !important;
    overscroll-behavior: none !important;
    touch-action: none; /* Evita rebotes elásticos en iOS y Android */
  }

  /* Ajustar los títulos principales */
  #wcTitle {
    font-size: 2.2rem !important;
    text-align: center;
  }

  /* Reducir logos */
  .logo, #worldLogo {
    width: 140px !important;
  }

  /* --- SECCIÓN DE EQUIPOS (VS) --- */
  .teams {
    flex-direction: column !important; /* Coloca un equipo sobre otro */
    gap: 15px !important;
    margin-top: 20px !important;
  }

  .crest {
    width: 90px !important; /* Achica los escudos para que quepan */
    height: 90px !important;
  }

  .vs {
    font-size: 1.8rem !important;
    margin: 5px 0;
  }

  /* --- SECCIÓN DE LA CUENTA REGRESIVA --- */
  .timer {
    gap: 15px !important; /* Reduce el espacio entre los bloques de tiempo */
    margin-top: 25px !important;
    width: 100%;
    justify-content: center;
  }

  .timebox {
    min-width: 65px; /* Asegura un tamaño uniforme */
  }

  .num {
    font-size: 2.8rem !important; /* Reduce los números gigantes (de 6rem a 2.8rem) */
    line-height: 1;
  }

  .label {
    font-size: 0.75rem !important; /* Letras de DÍAS, HORAS, etc., más compactas */
    margin-top: 5px;
  }

  /* --- AJUSTES DE BOTONES Y MENÚS --- */
  #selecciones {
    width: 85% !important; /* El buscador se adapta al ancho de la pantalla */
  }

  #worldCupBtn {
    top: 15px !important;
    right: 15px !important;
    font-size: 11px !important;
    padding: 8px 14px !important;
  }

  #backBtn {
    margin-left: 15px !important;
    padding: 10px 20px !important;
    font-size: 0.9rem;
  }

  /* Seccion del ganador */
  #winnerSection {
    margin-top: 20px !important;
  }
  
  #winnerName {
    font-size: 2rem !important;
  }
}
</style>
</head>

<script>
  const APP_VERSION='1.0.21';
const startScreen=document.getElementById('startScreen');
const intro=document.getElementById('intro');
const video=document.getElementById('introVideo');
const main=document.getElementById('main');
const matchView=document.getElementById('matchView');
const worldCupView=
document.getElementById('worldCupView');
const worldCupBtn=
document.getElementById('worldCupBtn');
const worldBackBtn=
document.getElementById('worldBackBtn');
const music=document.getElementById('bgMusic');
const endMusic=
document.getElementById('endMusic');
endMusic.pause();
endMusic.currentTime = 0;
const tick=document.getElementById('tickAudio');
const skipBtn=document.getElementById('skipBtn');

const winnerVideoView=
document.getElementById('winnerVideoView');
const WORLD_CUP_END='2026-07-19T20:00:00';
const WORLD_CUP_WINNER={
nombre:'TBD',
escudo:'escudos/tbd.png'
};

let worldTimer=null;
let partidos={};
let timerInterval=null;
function fadeOut(audio,duration=1000){

let vol=audio.volume;

const step=
vol/(duration/50);

const fade=
setInterval(()=>{

vol-=step;

if(vol<=0){

vol=0;

audio.volume=0;

audio.pause();

clearInterval(fade);

}else{

audio.volume=vol;

}

},50);

}

function fadeIn(audio,duration=1000){

audio.volume=0;

audio.play().catch(()=>{});

let vol=0;

const step=
1/(duration/50);

const fade=
setInterval(()=>{

vol+=step;

if(vol>=1){

vol=1;

audio.volume=1;

clearInterval(fade);

}else{

audio.volume=vol;

}

},50);

}

fetch('partidos.json')
.then(r=>r.json())
.then(data=>partidos=data)
.catch(()=>console.log('partidos.json pendiente'));

document.getElementById('enterBtn').onclick=()=>{

 startScreen.style.display='none';
 music.pause();
 intro.style.display='block';

 video.play();

 skipBtn.style.display='none';

 setTimeout(()=>{

   if(intro.style.display!=='none'){
      skipBtn.style.display='block';
   }

 },2000);

};
skipBtn.onclick=()=>{

 video.pause();

 finalizarIntro();

};

function finalizarIntro(){

   console.trace("finalizarIntro ejecutada");
 intro.style.display='none';
 main.style.display='block';

 document.getElementById('reportBtn').style.display='block';

 music.play().catch(()=>{});

 skipBtn.style.display='none';

}
 
async function checkVersion(){
try{
const response=
await fetch(
'version.json?t='+Date.now()
);
const data=
await response.json();
if(data.version!==APP_VERSION){
document
.getElementById('updateBtn')
.style.display='block';
}

}catch(e){

console.log(e);

}

}
video.onended=finalizarIntro;
console.log(typeof checkVersion);
setInterval(()=>{
  checkVersion();
},60000);
console.log("worldCupBtn encontrado");

document.getElementById('selecciones').onchange=(e)=>{
 const team=e.target.value;
 const p=partidos[team];
 if(!p) return;

 main.style.display='none';
 music.pause();
 matchView.style.display='block';

 document.getElementById('homeName').textContent=team;
 document.getElementById('awayName').textContent=p.rival;
 document.getElementById('homeCrest').src=p.escudo;
 document.getElementById('awayCrest').src=p.escudoRival;

 tick.currentTime=0;
 tick.play().catch(()=>{});

 clearInterval(timerInterval);

 function update(){
   const diff=new Date(p.fecha)-new Date();
   const d=Math.max(0,diff);
   document.getElementById('days').textContent=Math.floor(d/86400000);
   document.getElementById('hours').textContent=Math.floor(d%86400000/3600000);
   document.getElementById('minutes').textContent=Math.floor(d%3600000/60000);
   document.getElementById('seconds').textContent=Math.floor(d%60000/1000);
 }
 update();
 timerInterval=setInterval(update,1000);
};

document.getElementById('backBtn').onclick=()=>{
 matchView.style.display='none';
 music.play().catch(()=>{});
 main.style.display='block';
 tick.pause();
 tick.currentTime=0;
 clearInterval(timerInterval);
};

  document.getElementById('reportBtn').style.display='block';

  fadeOut(endMusic);

  setTimeout(()=>{

    fadeIn(music);

  },1000);

document.getElementById('worldCupBtn').onclick=()=>{

main.style.display='none';
document
.getElementById('reportBtn')
.style.display='none';

fadeOut(music);

setTimeout(()=>{

fadeIn(endMusic);

},1000);

worldCupView.style.display='block';

startWorldCountdown();

};

document.getElementById('worldBackBtn').onclick=()=>{

worldCupView.style.display='none';

main.style.display='block';
document
.getElementById('reportBtn')
.style.display='block';

fadeOut(endMusic);

setTimeout(()=>{

fadeIn(music);

},1000);

clearInterval(worldTimer);

};

function startWorldCountdown(){

clearInterval(worldTimer);

function updateWorld(){

const diff=
new Date(WORLD_CUP_END)-new Date();

if(diff<=0){

clearInterval(worldTimer);

showWinner();

return;

}

document.getElementById('wcDays').textContent=
Math.floor(diff/86400000);

document.getElementById('wcHours').textContent=
Math.floor(diff%86400000/3600000);

document.getElementById('wcMinutes').textContent=
Math.floor(diff%3600000/60000);

document.getElementById('wcSeconds').textContent=
Math.floor(diff%60000/1000);

}

updateWorld();

worldTimer=setInterval(
updateWorld,
1000
);

}

function showWinner(){

document.querySelector('.timer')
.style.transform='translateY(-300px)';

document.getElementById('wcTitle')
.style.transform='translateY(-300px)';

setTimeout(()=>{

document.querySelector('.timer')
.style.display='none';

document.getElementById('wcTitle')
.style.display='none';

document.getElementById('winnerSection')
.style.display='flex';

document.getElementById('winnerName')
.textContent=
WORLD_CUP_WINNER.nombre;

document.getElementById('winnerCrest')
.src=
WORLD_CUP_WINNER.escudo;

},1000);

}

document.getElementById('playWinnerVideo')
.onclick=()=>{

worldCupView.style.display='none';

winnerVideoView.style.display='block';

document
.getElementById('winnerVideo')
.play();

};
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/26TIMER/sw.js')
        .then(reg => console.log('Service Worker activo en:', reg.scope))
        .catch(err => console.error('Error al registrar el Service Worker:', err));
    });
  }
  const reportBtn=document.getElementById('reportBtn');
  reportBtn.style.display='none';
const reportModal=document.getElementById('reportModal');
const closeReport=document.getElementById('closeReport');
const reportForm=document.getElementById('reportForm');

reportBtn.onclick=()=>{

  reportModal.style.display='flex';

};

closeReport.onclick=()=>{

  reportModal.style.display='none';

};


reportForm.onsubmit=async(e)=>{

  e.preventDefault();

  const mensaje=
  document.getElementById('bugText').value;

  const response=await fetch(
    'https://api.web3forms.com/submit',
    {
      method:'POST',
      headers:{
        'Content-Type':'application/json'
      },
      body:JSON.stringify({

  access_key:'361f6bb5-03b0-48e5-886e-acbaae9ee24a',

  subject:'Reporte FWC26',

  from_name:'FWC26 Timer',

  message:mensaje

})

    }
  );

  const result=await response.json();

  if(result.success){

    alert(
      'Reporte enviado correctamente.'
    );

    reportForm.reset();

    reportModal.style.display='none';

  }else{

    alert(
      'No se pudo enviar el reporte.'
    );

  }

};
document
.getElementById('updateBtn')
.onclick=()=>{

  location.reload();

};
</script>
