<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FIFA World Cup 2026 Timer</title>

<style>

@font-face {
    font-family: 'FWC2026';
    src: url('FWC2026.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'FWC2026', Arial, sans-serif;
}

body{
    overflow-x:hidden;
    background:black;
}

/* ==========================
   INTRO
========================== */

#intro{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#intro video{
    width:100%;
    height:100%;
    object-fit:cover;

    pointer-events:none;

    -webkit-user-select:none;
    user-select:none;
}

/* ==========================
   MAIN
========================== */

#main{
    display:none;
    width:100%;
    min-height:100vh;

    background-image:url("fondo.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.overlay{
    width:100%;
    min-height:100vh;

    background:rgba(0,0,0,.45);

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:20px;
}

.logo{
    width:220px;
    max-width:80%;
    margin-bottom:30px;
}

.titulo{
    color:white;
    font-size:2rem;
    font-weight:bold;
    text-align:center;
    margin-bottom:25px;
    text-shadow:0 0 10px rgba(0,0,0,.8);
}

#selecciones{
    width:420px;
    max-width:90%;

    padding:16px;

    border:none;
    border-radius:15px;

    font-size:18px;
    font-weight:bold;

    text-align:center;

    background:white;
    color:#111;

    cursor:pointer;

    outline:none;

    box-shadow:0 0 20px rgba(255,255,255,.35);
}

#selecciones:hover{
    transform:scale(1.02);
}

.info{
    margin-top:25px;
    color:white;
    font-size:18px;
    text-align:center;
    text-shadow:0 0 10px rgba(0,0,0,.8);
}

@media(max-width:768px){

    .logo{
        width:180px;
    }

    .titulo{
        font-size:1.5rem;
    }

    #selecciones{
        width:90%;
    }

}

</style>
</head>

<body>

<!-- ==========================
     INTRO
========================== -->

<div id="intro">

    <video
        id="introVideo"
        autoplay
        playsinline
        preload="auto"
    >
        <source src="intro.mp4" type="video/mp4">
        Tu navegador no soporta video.
    </video>

</div>

<!-- ==========================
     MAIN
========================== -->

<div id="main">

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="overlay">

        <img
            src="logo.png"
            alt="FIFA World Cup 2026"
            class="logo"
        >

        <div class="titulo">
            FIFA WORLD CUP 2026™
        </div>

        <select id="selecciones">

            <option selected disabled>
                Selecciona una selección
            </option>

            <option>Argentina</option>
            <option>Australia</option>
            <option>Austria</option>
            <option>Bélgica</option>
            <option>Brasil</option>
            <option>Camerún</option>
            <option>Canadá</option>
            <option>Chile</option>
            <option>Colombia</option>
            <option>Corea del Sur</option>
            <option>Costa Rica</option>
            <option>Croacia</option>
            <option>Dinamarca</option>
            <option>Ecuador</option>
            <option>Egipto</option>
            <option>España</option>
            <option>Estados Unidos</option>
            <option>Francia</option>
            <option>Alemania</option>
            <option>Grecia</option>
            <option>Inglaterra</option>
            <option>Irán</option>
            <option>Italia</option>
            <option>Japón</option>
            <option>Marruecos</option>
            <option>México</option>
            <option>Nigeria</option>
            <option>Nueva Zelanda</option>
            <option>Noruega</option>
            <option>Países Bajos</option>
            <option>Panamá</option>
            <option>Paraguay</option>
            <option>Perú</option>
            <option>Polonia</option>
            <option>Portugal</option>
            <option>Arabia Saudita</option>
            <option>Senegal</option>
            <option>Serbia</option>
            <option>Sudáfrica</option>
            <option>Suecia</option>
            <option>Suiza</option>
            <option>Túnez</option>
            <option>Turquía</option>
            <option>Ucrania</option>
            <option>Uruguay</option>
            <option>Venezuela</option>

        </select>

        <div class="info">
            Próximamente: temporizador del siguiente partido.
        </div>

    </div>

</div>

<script>

const video = document.getElementById("introVideo");
const intro = document.getElementById("intro");
const main = document.getElementById("main");
const music = document.getElementById("bgMusic");

video.addEventListener("ended", () => {

    intro.style.display = "none";
    main.style.display = "block";

    music.play().catch(() => {
        console.log("El navegador bloqueó la reproducción automática.");
    });

});

document.getElementById("selecciones").addEventListener("change", function(){

    const seleccion = this.value;

    alert(
        "Has seleccionado: " + seleccion +
        "\n\nEn el siguiente paso agregaremos el temporizador del próximo partido."
    );

});

</script>

</body>
</html>
