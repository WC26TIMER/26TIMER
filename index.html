
<!DOCTYPE html> 
<html lang="es">
<head> 
  <link rel="manifest" href="/26TIMER/manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026™ Timer</title>
  <link rel="icon" type="image/png" href="logo.png">
<style>
@font-face{
  font-family:'FWC2026';
  src:url('./FWC26.ttf') format('truetype'); 
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'FWC2026',sans-serif}
body{background:#000;color:#fff;overflow:hidden} 
#startScreen,#intro,#main,#matchView{position:absolute;inset:0} 
#startScreen{display:flex;flex-direction:column;justify-content:center;align-items:center;background:#000;z-index:5}
#enterBtn{padding:18px 50px;border:none;border-radius:15px;font-size:2rem;cursor:pointer;color:#000;background:linear-gradient(135deg,#ffffff,#9b9b9b)}
#intro{display:none;background:#000;z-index:4}
#intro video{width:100%;height:100%;object-fit:cover}
#main,#matchView{display:none;background:url('fondo.png') center/cover no-repeat}
.overlay{min-height:100vh;background:rgba(0,0,0,.45);display:flex;flex-direction:column;justify-content:center;align-items:center}
.logo{width:220px;margin-bottom:20px}
#selecciones{padding:16px;width:420px;max-width:90%}
#matchView .overlay{justify-content:flex-start;padding-top:30px}
#backBtn{align-self:flex-start;margin-left:20px;padding:12px 24px;border:none;border-radius:12px;background:linear-gradient(135deg,#ffffff,#9b9b9b);color:#000;cursor:pointer}
.teams{display:flex;align-items:center;gap:40px;margin-top:40px}
.team{text-align:center}
.crest{width:140px;height:140px;object-fit:contain}
.vs{font-size:3rem}
.timer{display:flex;gap:40px;margin-top:60px}
.timebox{text-align:center}
.num{font-size:6rem}
.label{font-size:1rem}
</style>
</head>
<body>

<div id="startScreen">
<img src="logo.png" class="logo">
<button id="enterBtn">FWC26</button>
</div>

<div id="intro">
<video id="introVideo" playsinline preload="auto">
<source src="intro.mp4" type="video/mp4">
</video>
</div>

<div id="main">
<audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>
<div class="overlay">
<img src="logo.png" class="logo">
<select id="selecciones">
<option selected disabled>Selecciona una selección</option>
<option>Alemania</option>
<option>Argelia</option>
<option>Arabia Saudí</option>
<option>Argentina</option>
<option>Australia</option>
<option>Austria</option>
<option>Bélgica</option>
<option>Bosnia y Herzegovina</option>
<option>Brasil</option>
<option>Cabo Verde</option>
<option>Canadá</option>
<option>Catar</option>
<option>Colombia</option>
<option>Corea del Sur</option>
<option>Costa de Marfil</option>
<option>Croacia</option>
<option>Curazao</option>
<option>Ecuador</option>
<option>Egipto</option>
<option>Escocia</option>
<option>España</option>
<option>Estados Unidos</option>
<option>Francia</option>
<option>Ghana</option>
<option>Haití</option>
<option>Inglaterra</option>
<option>Irak</option>
<option>Irán</option>
<option>Japón</option>
<option>Jordania</option>
<option>Marruecos</option>
<option>México</option>
<option>Noruega</option>
<option>Nueva Zelanda</option>
<option>Países Bajos</option>
<option>Panamá</option>
<option>Paraguay</option>
<option>Portugal</option>
<option>RD Congo</option>
<option>República Checa</option>
<option>Senegal</option>
<option>Sudáfrica</option>
<option>Suecia</option>
<option>Suiza</option>
<option>Túnez</option>
<option>Turquía</option>
<option>Uzbekistán</option>
<option>Uruguay</option>
</select>
</div>
</div>

<div id="matchView">
<audio id="tickAudio" loop><source src="tick.mp3" type="audio/mpeg"></audio>
<div class="overlay">
<button id="backBtn">← BACK</button>

<div class="teams">
<div class="team">
<img id="homeCrest" class="crest" src="escudos/default.png">
<div id="homeName">Selección</div>
</div>

<div class="vs">VS</div>

<div class="team">
<img id="awayCrest" class="crest" src="escudos/default.png">
<div id="awayName">Rival</div>
</div>
</div>

<div class="timer">
<div class="timebox"><div class="num" id="days">0</div><div class="label">DÍAS</div></div>
<div class="timebox"><div class="num" id="hours">0</div><div class="label">HORAS</div></div>
<div class="timebox"><div class="num" id="minutes">0</div><div class="label">MINUTOS</div></div>
<div class="timebox"><div class="num" id="seconds">0</div><div class="label">SEGUNDOS</div></div>
</div>

</div>
</div>

<script>
const startScreen=document.getElementById('startScreen');
const intro=document.getElementById('intro');
const video=document.getElementById('introVideo');
const main=document.getElementById('main');
const matchView=document.getElementById('matchView');
const music=document.getElementById('bgMusic');
const tick=document.getElementById('tickAudio');

let partidos={};
let timerInterval=null;

fetch('partidos.json')
.then(r=>r.json())
.then(data=>partidos=data)
.catch(()=>console.log('partidos.json pendiente'));

document.getElementById('enterBtn').onclick=()=>{
 startScreen.style.display='none';
 intro.style.display='block';
 video.play();
};

video.onended=()=>{
 intro.style.display='none';
 main.style.display='block';
 music.play().catch(()=>{});
};

document.getElementById('selecciones').onchange=(e)=>{
 const team=e.target.value;
 const p=partidos[team];
 if(!p) return;

 main.style.display='none';
 matchView.style.display='block';

 document.getElementById('homeName').textContent=team;
 document.getElementById('awayName').textContent=p.rival;
 document.getElementById('homeCrest').src=p.escudo;
 document.getElementById('awayCrest').src=p.escudoRival;

 tick.currentTime=0;
 tick.play().catch(()=>{});

 clearInterval(timerInterval);

 function update(){
   const diff=new Date(p.fecha)-new Date();
   const d=Math.max(0,diff);
   document.getElementById('days').textContent=Math.floor(d/86400000);
   document.getElementById('hours').textContent=Math.floor(d%86400000/3600000);
   document.getElementById('minutes').textContent=Math.floor(d%3600000/60000);
   document.getElementById('seconds').textContent=Math.floor(d%60000/1000);
 }
 update();
 timerInterval=setInterval(update,1000);
};

document.getElementById('backBtn').onclick=()=>{
 matchView.style.display='none';
 main.style.display='block';
 tick.pause();
 tick.currentTime=0;
 clearInterval(timerInterval);
};
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/26TIMER/sw.js')
        .then(reg => console.log('Service Worker activo en:', reg.scope))
        .catch(err => console.error('Error al registrar el Service Worker:', err));
    });
  }
</script>
</body>
</html>
